<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Your Cart | AuraTech</title>
</head>

<body>
    <div class="container">
        <div class="navbar pt-4">
            <div class="logo">
                <img src="images/logo.png" style="height:60px;" alt="AuraTech Logo">
            </div>
            <nav>
                <ul id="menu-items">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index2.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="register.html">Account</a></li>
                </ul>
            </nav>
            <div style="position: relative; display: inline-block; cursor: pointer;">
                <a href="cart.html">
                    <img src="images/cart.png" alt="cart" width="30px" height="30px" class="cart-img">
                    <span id="cart-count" style="position: absolute; top: -8px; right: -10px; background: #e8491d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: bold;">0</span>
                </a>
            </div>
        </div>
    </div>

    <div class="small-container cart-page" style="min-height: 50vh; margin-top: 50px; margin-bottom: 80px;">
        <h2 style="text-align: left; margin-bottom: 30px; color: #333;">Shopping Cart</h2>
        
        <table id="cart-table" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="cart-items-container">
                </tbody>
        </table>

        <div class="total-price" id="total-price-container" style="display: none;">
            <table>
                <tr>
                    <td>Subtotal</td>
                    <td id="cart-subtotal">Rs0.00</td>
                </tr>
                <tr>
                    <td>Tax (5%)</td>
                    <td id="cart-tax">Rs0.00</td>
                </tr>
                <tr>
                    <td><strong>Total</strong></td>
                    <td id="cart-total" style="font-weight: bold; color: #210583;">Rs0.00</td>
                </tr>
            </table>
            <div style="text-align: right; margin-top: 20px;">
                <a href="checkout.html" class="btn btn-main">Proceed to Checkout &#8594;</a>
            </div>
        </div>
        
        <div id="empty-cart-message" style="text-align: center; display: none; margin-top: 50px;">
            <h3 style="color: #888;">Your cart is currently empty.</h3>
            <a href="index.html" class="btn btn-main mt-3">Continue Shopping</a>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="copyright">Copyright 2026 Sarthak</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
